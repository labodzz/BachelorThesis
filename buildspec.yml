version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  build:
    commands:
      - cd monitoring-app
      - chmod +x mvnw
      - ./mvnw clean package -DskipTests

  post_build:
    commands:
      - mkdir output
      - cp monitoring-app/target/*.jar output/app.jar
      - cd output
      - zip -r app.zip app.jar

artifacts:
  files:
    - output/app.zip
